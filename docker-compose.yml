services:
  artvis-db:
    container_name: artvis-db
    networks:
      - artvis-network
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: on-failure
    volumes:
      - ./artvis-graph-db/import.sh:/var/lib/neo4j/import.sh
      - ./artvis-graph-db/certificates:/var/lib/neo4j/certificates
      - ./artvis-graph-db/neo4j_dump:/var/lib/neo4j/dump
    env_file:
      - ./artvis-graph-db/dev.env
    environment:
      NEO4J_PLUGINS: '["apoc", "apoc-extended", "graph-data-science"]'
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          cypher-shell -a bolt://localhost:7687
          -u "$${NEO4J_AUTH%%/*}"
          -p "$${NEO4J_AUTH#*/}"
          "RETURN 1" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    build:
      context: ./artvis-graph-db
      dockerfile: Dockerfile

  backend:
    build:
      context: ./backend
    container_name: artvis-backend
    env_file:
      - ./artvis-graph-db/dev.env
    environment:
      NEO4J_URI: bolt://artvis-db:7687
      ML_RANDOM_SEED: "42"
      TORCH_NUM_THREADS: "8"
      ATTRIBUTE_DIM: "128"
      COMPLEX_DIM: "64"
      ATTRIBUTE_HIDDEN_DIM: "128"
      TRAIN_EPOCHS: "40"
      FINAL_TRAIN_EPOCHS: "6"
      TRAIN_BATCH_SIZE: "2048"
      NEGATIVES_PER_POSITIVE: "1"
      LEARNING_RATE: "0.001"
      WEIGHT_DECAY: "0.00001"
      RELATION_EPOCH_CAP: "250000"
      EARLY_STOPPING_PATIENCE: "5"
      HDBSCAN_MIN_CLUSTER_SIZES: "20,50,100,200"
      HDBSCAN_MIN_SAMPLES_VALUES: "5,10,20"
      HDBSCAN_MAX_NOISE_FRACTION: "0.80"
      HDBSCAN_PCA_VARIANCE: "0.95"
      HDBSCAN_PCA_MAX_COMPONENTS: "50"
      UMAP_N_NEIGHBORS: "30"
      UMAP_MIN_DIST: "0.1"
      UMAP_METRIC: cosine
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/ml/data:/app/app/ml/data
    ports:
      - "8000:8000"
    depends_on:
      artvis-db:
        condition: service_healthy
    networks:
      - artvis-network

  frontend:
    build:
      context: ./frontend
    container_name: artvis-frontend
    networks:
      - artvis-network
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_started

networks:
  artvis-network:
    name: artvis-network
    driver: bridge
